# render.yaml — PolicyGuard deployment configuration
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push this repo to GitHub (SpencerStiles/policyguard)
#   2. Go to render.com → New → Blueprint → connect the repo
#   3. Render will read this file and provision all services below
#   4. Fill in secret env vars (OPENAI_API_KEY, JWT_SECRET) in the Render dashboard
#      after the first deploy — do NOT commit real secrets here.

databases:
  - name: policyguard-db
    databaseName: policyguard
    user: policyguard
    plan: free          # upgrade to starter ($7/mo) for production persistence
    region: oregon      # match your web service region

services:
  - type: web
    name: policyguard-api
    runtime: docker
    region: oregon
    plan: free          # upgrade to starter ($7/mo) for always-on
    rootDir: apps/api
    dockerfilePath: ./Dockerfile   # relative to rootDir
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # ── Database (auto-filled by Render from the database above) ──────────
      - key: DATABASE_URL
        fromDatabase:
          name: policyguard-db
          property: connectionString
        # Render provides a standard postgresql:// URL.
        # The app uses asyncpg, so the URL must start with
        # postgresql+asyncpg:// — the startup script handles this via
        # the DATABASE_URL env var; ensure config.py accepts this prefix.

      # ── Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render generates a random secret on first deploy

      # ── LLM providers ────────────────────────────────────────────────────
      # Set these in the Render dashboard → Environment tab (never commit keys)
      - key: OPENAI_API_KEY
        sync: false           # marks as secret; must be set manually in dashboard

      - key: ANTHROPIC_API_KEY
        sync: false           # optional — only needed if using Anthropic models

      # ── Model selection (safe to commit — no secrets) ─────────────────────
      - key: OPENAI_MODEL
        value: gpt-4o

      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514

      - key: EMBEDDING_MODEL
        value: text-embedding-3-small

      # ── Storage paths (ephemeral disk on free tier) ───────────────────────
      - key: UPLOAD_DIR
        value: /app/data/uploads

      - key: CHROMA_PERSIST_DIR
        value: /app/data/chroma

      # ── CORS — update after deploy with real frontend URL ─────────────────
      # Replace the placeholder with your actual Vercel URL (and custom domain
      # once it's set up).  Format: JSON array as a string.
      - key: CORS_ORIGINS
        value: '["https://policyguard-peach.vercel.app","https://policyguard.spencerstiles.dev"]'

      # ── Python ────────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
