name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Python API — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install -r requirements.txt ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type-check (mypy)
        run: mypy src/ --ignore-missing-imports

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install from monorepo root so workspace:* links resolve
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build workspace packages first (coplayground-core, coplayground-react)
      - name: Build workspace packages
        run: pnpm --filter @coplayground/core build && pnpm --filter @coplayground/react build

      - name: Type-check
        working-directory: apps/web
        run: pnpm exec tsc --noEmit

      - name: Build
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
